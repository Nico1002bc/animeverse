{% extends "base.html" %}
{% block title %}Editar – {{ anime.titulo }}{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <h1>Editar anime</h1>
    <p>Modificando: <strong>{{ anime.titulo }}</strong></p>
  </div>

  <div class="form-card">
    <form method="POST" action="{{ url_for('anime.editar', oid=oid) }}">

      <div class="form-group">
        <label class="form-label" for="titulo">Título *</label>
        <input id="titulo" name="titulo" type="text" class="form-control"
               required value="{{ anime.titulo }}">
      </div>

      <div class="form-group">
        <label class="form-label" for="sinopsis">Sinopsis *</label>
        <textarea id="sinopsis" name="sinopsis" class="form-control" rows="4">{{ anime.sinopsis }}</textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Géneros</label>
        <div class="checkbox-group">
          {% for g in generos %}
            <div class="checkbox-pill">
              <input type="checkbox" id="g_{{ g }}" name="generos" value="{{ g }}"
                     {% if g in (anime.generos or []) %}checked{% endif %}>
              <label for="g_{{ g }}">{{ g }}</label>
            </div>
          {% endfor %}
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem">
        <div class="form-group">
          <label class="form-label" for="año">Año</label>
          <input id="año" name="año" type="number" class="form-control"
                 min="1960" max="2030" value="{{ anime.año }}">
        </div>
        <div class="form-group">
          <label class="form-label" for="episodios">Episodios</label>
          <input id="episodios" name="episodios" type="number" class="form-control"
                 min="1" value="{{ anime.episodios or '' }}">
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem">
        <div class="form-group">
          <label class="form-label" for="estado">Estado</label>
          <select id="estado" name="estado" class="form-control">
            {% for key, label in estados.items() %}
              <option value="{{ key }}" {% if anime.estado == key %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="tipo">Tipo</label>
          <select id="tipo" name="tipo" class="form-control">
            {% for key, label in tipos.items() %}
              <option value="{{ key }}" {% if (anime.tipo|default('serie')) == key %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="trailer_url">URL del tráiler</label>
        <input id="trailer_url" name="trailer_url" type="url" class="form-control"
               value="{{ anime.trailer_url|default('') }}">
      </div>

      <div class="form-group">
        <label class="form-label" for="imagen_url">URL de imagen</label>
        <input id="imagen_url" name="imagen_url" type="url" class="form-control"
               value="{{ anime.imagen_url or '' }}">
        <img id="img-preview" alt="Vista previa">
      </div>

      <div style="display:flex; gap:0.75rem">
        <button type="submit" class="btn btn-primary">Guardar cambios</button>
        <a href="{{ url_for('anime.detalle', oid=oid) }}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
