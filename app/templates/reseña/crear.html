{% extends "base.html" %}
{% block title %}Escribir reseña{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <h1>Escribir reseña</h1>
    <p>Opinando sobre: <a href="{{ url_for('anime.detalle', oid=oid_anime) }}">{{ anime.titulo }}</a></p>
  </div>

  <div class="form-card">
    <form method="POST" action="{{ url_for('reseña.crear', oid_anime=oid_anime) }}">

      <div class="form-group">
        <label class="form-label">Puntuación</label>
        <div class="star-rating" id="star-rating">
          {% for i in range(5, 0, -1) %}
            <input type="radio" id="star{{ i }}" name="nota" value="{{ i }}" required>
            <label for="star{{ i }}" title="{{ i }}/5">★</label>
          {% endfor %}
        </div>
        <p style="font-size:0.8rem; color:var(--text-3); margin-top:0.4rem">
          Haz clic en las estrellas para puntuar (1–5)
        </p>
      </div>

      <div class="form-group">
        <label class="form-label" for="comentario">Comentario *</label>
        <textarea id="comentario" name="comentario" class="form-control"
                  placeholder="¿Qué te ha parecido?" rows="5" required></textarea>
      </div>

      <div style="display:flex; gap:0.75rem">
        <button type="submit" class="btn btn-primary">Publicar reseña</button>
        <a href="{{ url_for('anime.detalle', oid=oid_anime) }}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
